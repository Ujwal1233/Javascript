<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Timer Example</h1>
    <p>Check the console for timer outputs.</p>


    <script>
        setTimeout(function() {
            alert("Welcome to JavaScript!");
        }, 2000); 

        let sayhello=()=>{
            alert("Hello, this is a repeated message!");
        }
        setTimeout(sayhello, 4000);
    </script>
</body>
</html>
