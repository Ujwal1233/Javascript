<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>* Without using Event delegation</h1>
  <div id="parent">
      <button id="btn1">Click 1</button>
      <button id="btn2">Click 2</button>
      <button id="btn3">Click 3</button>
      <button id="btn4">Click 4</button>
      <button id="btn5">Click 5</button>
  </div>
<script>
let btn1=document.getElementById('btn1')
let btn2=document.getElementById('btn2')
let btn3=document.getElementById('btn3')
let btn4=document.getElementById('btn4')
let btn5=document.getElementById('btn5')

btn1.addEventListener('click',function(){
    alert("Good morning 1")
})

btn2.addEventListener('click',function(){
    alert("Good morning 2")
})

btn3.addEventListener('click',function(){
    alert("Good morning 3")
})

btn4.addEventListener('click',function(){
    alert("Good morning 4")
})

btn5.addEventListener('click',function(){
    alert("Good morning 5")
})

</script>


</body>

</html>
