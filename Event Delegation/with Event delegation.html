<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #parent{
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        width: 400px;
        height: 400px;
        border: 10px solid goldenrod;
    }
    button{
        margin: 10px;
        width: 100px;
        height: 50px;
        background-color: lightblue;
        border-color: burlywood;
        border-width: 2px;
        border-radius: 50%;
    }
</style>
<body>
    <h1>* With using Event delegation</h1>
    <div id="parent">
        <button class="btn">Vishal</button>
        <button class="btn">Bharath</button>
        <button class="btn">Suresh</button> 
        <button class="btn">Ramesh</button>
        <button class="btn">Mahesh</button>
    
    </div>

    <script>
        document.getElementById('parent').addEventListener('click',(event)=>{
            if(event.target.classList.contains('btn')){
                alert("Good morning "+event.target.innerText)
            }
        })

    </script>
</body>
</html>
