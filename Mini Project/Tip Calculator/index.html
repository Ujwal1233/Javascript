<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>💰 Tip Calculator</h1>
            <p>Calculate tips and split bills easily</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label for="bill-amount">Bill Amount ($)</label>
                <input type="number" id="bill-amount" placeholder="0.00" min="0" step="0.01">
            </div>

            <div class="input-group">
                <label for="tip-percentage">Tip Percentage (%)</label>
                <input type="number" id="tip-percentage" placeholder="15" min="0" max="100" step="0.1">
            </div>

            <div class="tip-buttons">
                <button class="tip-btn" data-tip="10">10%</button>
                <button class="tip-btn" data-tip="15">15%</button>
                <button class="tip-btn" data-tip="18">18%</button>
                <button class="tip-btn" data-tip="20">20%</button>
                <button class="tip-btn" data-tip="25">25%</button>
            </div>

            <div class="input-group">
                <label for="num-people">Number of People</label>
                <input type="number" id="num-people" placeholder="1" min="1" value="1">
            </div>
        </div>

        <div class="results-section">
            <div class="result-card">
                <div class="result-item">
                    <span class="label">Tip Amount</span>
                    <span class="amount" id="tip-amount">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="label">Total Amount</span>
                    <span class="amount" id="total-amount">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="label">Amount per Person</span>
                    <span class="amount" id="per-person">$0.00</span>
                </div>
                <div class="result-item">
                    <span class="label">Tip per Person</span>
                    <span class="amount" id="tip-per-person">$0.00</span>
                </div>
            </div>
        </div>

        <div class="reset-section">
            <button id="reset-btn" class="reset-btn">Reset Calculator</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
