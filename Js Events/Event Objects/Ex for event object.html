<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Example for event object</h1>
    <button onclick="clickHandler(event)">Click for event object</button>
    <script>
        function clickHandler(event){
       console.log(event)
       console.log(event.target)
       console.log(event.type)
      event.target.style.backgroundColor="red"
      for(var data in event){
        console.log(data)
      }
      event.target.remove()
        }
    </script>
</body>
</html>
