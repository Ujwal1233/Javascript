<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<button onclick="generatePara()">generate para</button>
	<button onclick="generateImage()">generate image</button>
	<script>
		function generatePara(){
			var para=document.createElement("p")
			para.textContent="i am dynamic generated by click event"
			document.body.appendChild(para)
		}

		function generateImage(){
			var img = document.createElement("img")
			img.src = "https://cdn.britannica.com/48/252748-050-C514EFDB/Virat-Kohli-India-celebrates-50th-century-Cricket-November-15-2023.jpg"
			img.alt = "virat kohli"
			img.style.display = "block"
			img.style.marginTop = "10px"
			document.body.appendChild(img)
		}
	</script>
</body>
</html>
