<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>document.createElement Example</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 20px;
		}
		button {
			margin-right: 10px;
			padding: 8px 12px;
			cursor: pointer;
		}
		#output {
			margin-top: 20px;
		}
		section {
			margin-bottom: 20px;
		}
	</style>
</head>
<body>
	<h1>document.createElement() - Ordered and Unordered List</h1>

	<button id="createOrdered">Create Ordered List</button>
	<button id="createUnordered">Create Unordered List</button>

	<div id="output"></div>

	<script>
		const output = document.getElementById('output');

		function createList(type, title, items) {
			const section = document.createElement('section');

			const heading = document.createElement('h2');
			heading.textContent = title;
			section.appendChild(heading);

			const list = document.createElement(type);

			items.forEach(itemText => {
				const li = document.createElement('li');
				li.textContent = itemText;
				list.appendChild(li);
			});

			section.appendChild(list);
			output.appendChild(section);
		}

		document.getElementById('createOrdered').addEventListener('click', () => {
			createList('ol', 'Ordered List', ['HTML', 'CSS', 'JavaScript']);
		});

		document.getElementById('createUnordered').addEventListener('click', () => {
			createList('ul', 'Unordered List', ['Apple', 'Banana', 'Orange']);
		});
	</script>
</body>
</html>
