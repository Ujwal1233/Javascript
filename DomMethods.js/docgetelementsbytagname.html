<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>document.getElementsByTagName() Demo</title>
	<style>
		body { font-family: Arial, sans-serif; padding: 20px; }
		.highlight { color: #0b5ed7; font-weight: bold; }
	</style>
</head>
<body>
	<h1>getElementsByTagName Example</h1>

	<p>First paragraph</p>
	<p>Second paragraph</p>
	<p>Third paragraph</p>

	<button id="countBtn">Count & Highlight Paragraphs</button>
	<p id="result"></p>

	<script>
		const button = document.getElementById("countBtn");
		const result = document.getElementById("result");

		button.addEventListener("click", function () {
			const paragraphs = document.getElementsByTagName("p");
			result.textContent = "Total <p> elements: " + paragraphs.length;

			for (let i = 0; i < paragraphs.length - 1; i++) {
				paragraphs[i].classList.add("highlight");
			}
		});
	</script>
</body>
</html>
