<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>document.write Example</title>
</head>
<body>
	<h1>document.write()</h1>

	<script>
		document.write("<p>Hello from <strong>document.write()</strong>!</p>");
		document.write("<p>Current date and time: " + new Date() + "</p>");
	</script>
</body>
</html>
